[build]
  publish = "site"
  # No build command — static files only.

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/clarify"
  to = "/.netlify/functions/clarify"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
