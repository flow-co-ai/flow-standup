name: Weekly Standup

on:
  # Every day at 12:00 UTC = 7:00 AM Chicago (CDT) / 6:00 AM (CST)
  schedule:
    - cron: "0 12 * * *"

  # Also lets you click "Run workflow" in the GitHub UI any time
  workflow_dispatch:

permissions:
  contents: write  # needed to commit the standup file back to main

jobs:
  generate-standup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate standup report
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python generate.py

      - name: Commit standup file to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add standups/ site/latest.json archive/
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "standup: weekly report $(date -u +%Y-%m-%d)"
            git push
          fi
