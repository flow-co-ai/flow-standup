name: Daily Standup

on:
  # Every day at 12:00 UTC = 7:00 AM Chicago (CDT) / 6:00 AM (CST)
  schedule:
    - cron: "0 12 * * *"

  # Also lets you click "Run workflow" in the GitHub UI any time
  workflow_dispatch:

permissions:
  contents: write  # needed to commit the standup file back to main

jobs:
  generate-standup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate standup report
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python generate.py

      - name: Commit standup file to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add standups/ site/latest.json archive/ alerts/ history/
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi

          git commit -m "standup: daily report $(date -u +%Y-%m-%d)"

          # Retry on a rejected push (a concurrent run -- e.g. two manual
          # triggers close together -- landed its commit first): fetch and
          # rebase onto the latest main, then retry. If the rebase itself
          # conflicts, there's no sane way to merge two independent full
          # regenerations of the same generated files -- abort the rebase,
          # drop this run's commit, and defer to whichever run already
          # landed, rather than leaving the repo mid-rebase or forcing a
          # conflicting overwrite.
          attempt=1
          max_attempts=5
          until git push; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Push failed after $max_attempts attempts -- giving up."
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) -- fetching and rebasing onto origin/main..."
            git fetch origin main
            if git rebase origin/main; then
              echo "Rebase succeeded, retrying push..."
            else
              echo "Rebase conflicted -- a concurrent run's commit already covers this update. Dropping this run's commit."
              git rebase --abort
              git reset --hard origin/main
              echo "Nothing to push -- deferring to the concurrent run."
              exit 0
            fi
            sleep $((RANDOM % 5 + 1))
            attempt=$((attempt + 1))
          done
          echo "Pushed successfully."
